<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900" height="280">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020b14;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#040f1a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#000d18;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="cyanGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ffe7;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00ffe7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00ffe7;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ffe7"/>
      <stop offset="60%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#7b61ff"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="bannerClip">
      <rect width="900" height="280" rx="12"/>
    </clipPath>
  </defs>

  <g clip-path="url(#bannerClip)">
    <!-- Background -->
    <rect width="900" height="280" fill="url(#bgGrad)"/>

    <!-- Grid lines - horizontal -->
    <g stroke="#00ffe7" stroke-opacity="0.04" stroke-width="1">
      <line x1="0" y1="35" x2="900" y2="35"/>
      <line x1="0" y1="70" x2="900" y2="70"/>
      <line x1="0" y1="105" x2="900" y2="105"/>
      <line x1="0" y1="140" x2="900" y2="140"/>
      <line x1="0" y1="175" x2="900" y2="175"/>
      <line x1="0" y1="210" x2="900" y2="210"/>
      <line x1="0" y1="245" x2="900" y2="245"/>
    </g>
    <!-- Grid lines - vertical -->
    <g stroke="#00ffe7" stroke-opacity="0.03" stroke-width="1">
      <line x1="90" y1="0" x2="90" y2="280"/>
      <line x1="180" y1="0" x2="180" y2="280"/>
      <line x1="270" y1="0" x2="270" y2="280"/>
      <line x1="360" y1="0" x2="360" y2="280"/>
      <line x1="450" y1="0" x2="450" y2="280"/>
      <line x1="540" y1="0" x2="540" y2="280"/>
      <line x1="630" y1="0" x2="630" y2="280"/>
      <line x1="720" y1="0" x2="720" y2="280"/>
      <line x1="810" y1="0" x2="810" y2="280"/>
    </g>

    <!-- Floating matrix rain characters (static, atmospheric) -->
    <g font-family="'Courier New', monospace" font-size="11" fill="#00ffe7" fill-opacity="0.08">
      <text x="18" y="22">1</text><text x="18" y="44">0</text><text x="18" y="66">1</text><text x="18" y="88">0</text><text x="18" y="110">1</text><text x="18" y="132">1</text><text x="18" y="154">0</text>
      <text x="38" y="33">0</text><text x="38" y="55">1</text><text x="38" y="77">0</text><text x="38" y="99">1</text><text x="38" y="121">0</text><text x="38" y="143">1</text>
      <text x="852" y="28">1</text><text x="852" y="50">0</text><text x="852" y="72">1</text><text x="852" y="94">0</text><text x="852" y="116">1</text><text x="852" y="138">0</text>
      <text x="872" y="39">0</text><text x="872" y="61">1</text><text x="872" y="83">0</text><text x="872" y="105">1</text><text x="872" y="127">0</text>
    </g>

    <!-- Brighter matrix characters near edges -->
    <g font-family="'Courier New', monospace" font-size="11" fill="#00ffe7" fill-opacity="0.18">
      <text x="18" y="22">1</text>
      <text x="872" y="39">0</text>
    </g>

    <!-- Top circuit line -->
    <g stroke="#00ffe7" stroke-opacity="0.25" stroke-width="1" fill="none">
      <polyline points="0,18 60,18 75,8 120,8 135,18 280,18"/>
      <circle cx="75" cy="8" r="2" fill="#00ffe7" fill-opacity="0.4"/>
      <circle cx="135" cy="18" r="2" fill="#00ffe7" fill-opacity="0.4"/>
    </g>

    <!-- Bottom circuit line right -->
    <g stroke="#7b61ff" stroke-opacity="0.25" stroke-width="1" fill="none">
      <polyline points="900,262 840,262 825,272 780,272 765,262 620,262"/>
      <circle cx="825" cy="272" r="2" fill="#7b61ff" fill-opacity="0.4"/>
      <circle cx="765" cy="262" r="2" fill="#7b61ff" fill-opacity="0.4"/>
    </g>

    <!-- Shield / lock icon (center-left, decorative) -->
    <g transform="translate(68, 105)" filter="url(#glow)">
      <path d="M0,-35 L28,-20 L28,5 Q28,30 0,42 Q-28,30 -28,5 L-28,-20 Z" fill="none" stroke="#00ffe7" stroke-width="1.5" stroke-opacity="0.6"/>
      <!-- keyhole -->
      <circle cx="0" cy="2" r="7" fill="none" stroke="#00ffe7" stroke-width="1.2" stroke-opacity="0.7"/>
      <rect x="-3" y="8" width="6" height="9" rx="1" fill="#00ffe7" fill-opacity="0.2" stroke="#00ffe7" stroke-width="1" stroke-opacity="0.6"/>
    </g>

    <!-- Hexagon decoration top-right -->
    <g transform="translate(810, 55)" fill="none" stroke="#7b61ff" stroke-opacity="0.3" stroke-width="1">
      <polygon points="0,-28 24,-14 24,14 0,28 -24,14 -24,-14"/>
      <polygon points="0,-18 15,-9 15,9 0,18 -15,9 -15,-9" stroke-opacity="0.15"/>
    </g>

    <!-- Small hex bottom-left -->
    <g transform="translate(120, 230)" fill="none" stroke="#00ffe7" stroke-opacity="0.2" stroke-width="1">
      <polygon points="0,-16 14,-8 14,8 0,16 -14,8 -14,-8"/>
    </g>

    <!-- Scanning line effect -->
    <rect x="0" y="0" width="900" height="2" fill="url(#cyanGlow)" opacity="0.15">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,280;0,0" dur="4s" repeatCount="indefinite"/>
    </rect>

    <!-- Top accent line -->
    <line x1="160" y1="0" x2="740" y2="0" stroke="url(#cyanGlow)" stroke-width="2" opacity="0.6"/>

    <!-- === MAIN TEXT === -->

    <!-- "CIPHERFORGE" label small eyebrow -->
    <text x="450" y="80" font-family="'Courier New', monospace" font-size="11" fill="#00ffe7" fill-opacity="0.7" letter-spacing="8" text-anchor="middle" filter="url(#subtleGlow)">⌬ CHANDULA ⌬</text>

    <!-- Main name - huge -->
    <text x="450" y="148" font-family="'Courier New', monospace" font-size="52" font-weight="bold" letter-spacing="-1" text-anchor="middle" fill="url(#titleGrad)" filter="url(#strongGlow)" class="__web-inspector-hide-shortcut__">CIPHERFORGE</text>

    <!-- Glitch shadow layer -->
    <text x="453" y="148" font-family="'Courier New', monospace" font-size="52" font-weight="bold" letter-spacing="-1" text-anchor="middle" fill="#ff003c" fill-opacity="0.12">CIPHERFORGE</text>

    <!-- Role line -->
    <text x="450" y="178" font-family="'Courier New', monospace" font-size="13.5" fill="#a0f0e8" fill-opacity="0.85" letter-spacing="3" text-anchor="middle">Software Engineer  ·  Security Researcher  ·  Builder</text>

    <!-- Divider line -->
    <line x1="310" y1="192" x2="590" y2="192" stroke="#00ffe7" stroke-opacity="0.3" stroke-width="0.8"/>

    <!-- Tagline -->
    <text x="450" y="215" font-family="'Courier New', monospace" font-size="11.5" fill="#7b61ff" fill-opacity="0.9" letter-spacing="1.5" text-anchor="middle" filter="url(#subtleGlow)">// break it. understand it. build it better.</text>

    <!-- University tag -->
    <text x="450" y="245" font-family="'Courier New', monospace" font-size="10" fill="#ffffff" fill-opacity="0.35" letter-spacing="2" text-anchor="middle">University of Kelaniya  ·  SE Undergraduate</text>

    <!-- Corner brackets -->
    <g stroke="#00ffe7" stroke-opacity="0.4" stroke-width="1.5" fill="none">
      <!-- top-left -->
      <polyline points="10,10 10,30 30,30"/>
      <!-- top-right -->
      <polyline points="890,10 890,30 870,30"/>
      <!-- bottom-left -->
      <polyline points="10,270 10,250 30,250"/>
      <!-- bottom-right -->
      <polyline points="890,270 890,250 870,250"/>
    </g>

    <!-- Blinking cursor after name -->
    <rect x="678" y="104" width="3" height="14" fill="#00ffe7" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0;0.8" dur="1.1s" repeatCount="indefinite"/>
    </rect>

    <!-- Bottom fade -->
    <rect x="0" y="240" width="900" height="40" fill="url(#bgGrad)" opacity="0.4"/>
  </g>
</svg>