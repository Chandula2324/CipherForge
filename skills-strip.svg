<svg viewBox="0 0 900 80" xmlns="http://www.w3.org/2000/svg" width="900" height="80">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#020b14"/>
      <stop offset="100%" style="stop-color:#040f1a"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="80" rx="8" fill="url(#bg2)" stroke="#00ffe7" stroke-opacity="0.15" stroke-width="1"/>

  <!-- Dividers -->
  <line x1="180" y1="15" x2="180" y2="65" stroke="#00ffe7" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="360" y1="15" x2="360" y2="65" stroke="#00ffe7" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="540" y1="15" x2="540" y2="65" stroke="#00ffe7" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="720" y1="15" x2="720" y2="65" stroke="#00ffe7" stroke-opacity="0.12" stroke-width="1"/>

  <!-- Block 1: Cybersecurity -->
  <text x="90" y="33" font-family="'Courier New', monospace" font-size="18" text-anchor="middle" fill="#00ffe7" filter="url(#glow2)">🔐</text>
  <text x="90" y="52" font-family="'Courier New', monospace" font-size="10" text-anchor="middle" fill="#00ffe7" letter-spacing="1" fill-opacity="0.9">CYBERSECURITY</text>
  <text x="90" y="65" font-family="'Courier New', monospace" font-size="8.5" text-anchor="middle" fill="#ffffff" fill-opacity="0.35" letter-spacing="0.5">Pentesting · CTF · Recon</text>

  <!-- Block 2: Software Engineering -->
  <text x="270" y="33" font-family="'Courier New', monospace" font-size="18" text-anchor="middle" fill="#7b61ff" filter="url(#glow2)">⚙️</text>
  <text x="270" y="52" font-family="'Courier New', monospace" font-size="10" text-anchor="middle" fill="#7b61ff" letter-spacing="1" fill-opacity="0.9">SOFTWARE ENG</text>
  <text x="270" y="65" font-family="'Courier New', monospace" font-size="8.5" text-anchor="middle" fill="#ffffff" fill-opacity="0.35" letter-spacing="0.5">React · Node · Electron</text>

  <!-- Block 3: OS / Low Level -->
  <text x="450" y="33" font-family="'Courier New', monospace" font-size="18" text-anchor="middle" fill="#ff6b35" filter="url(#glow2)">🖥️</text>
  <text x="450" y="52" font-family="'Courier New', monospace" font-size="10" text-anchor="middle" fill="#ff6b35" letter-spacing="1" fill-opacity="0.9">LOW-LEVEL / OS</text>
  <text x="450" y="65" font-family="'Courier New', monospace" font-size="8.5" text-anchor="middle" fill="#ffffff" fill-opacity="0.35" letter-spacing="0.5">x86 · NASM · C · Linux</text>

  <!-- Block 4: Breaking & Learning -->
  <text x="630" y="33" font-family="'Courier New', monospace" font-size="18" text-anchor="middle" fill="#00ffe7" filter="url(#glow2)">💀</text>
  <text x="630" y="52" font-family="'Courier New', monospace" font-size="10" text-anchor="middle" fill="#00ffe7" letter-spacing="1" fill-opacity="0.9">BREAK TO LEARN</text>
  <text x="630" y="65" font-family="'Courier New', monospace" font-size="8.5" text-anchor="middle" fill="#ffffff" fill-opacity="0.35" letter-spacing="0.5">Reverse Eng · Exploits · CTF</text>

  <!-- Block 5: Building -->
  <text x="810" y="33" font-family="'Courier New', monospace" font-size="18" text-anchor="middle" fill="#7b61ff" filter="url(#glow2)">🛠️</text>
  <text x="810" y="52" font-family="'Courier New', monospace" font-size="10" text-anchor="middle" fill="#7b61ff" letter-spacing="1" fill-opacity="0.9">ALWAYS BUILDING</text>
  <text x="810" y="65" font-family="'Courier New', monospace" font-size="8.5" text-anchor="middle" fill="#ffffff" fill-opacity="0.35" letter-spacing="0.5">Apps · Tools · Systems</text>
</svg>
